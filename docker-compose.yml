services:
  postgres_master:
    image: postgres:18
    container_name: postgres_master_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: employee
      POSTGRES_PASSWORD: secret123
      POSTGRES_HOST_AUTH_METHOD: trust
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: secret123
      REPLICATION_SLOT: replica_slot
    volumes:
      - postgres_master_data:/var/lib/postgresql
      - ./docker/postgres/create-replication-user.sh:/docker-entrypoint-initdb.d/create-replication-user.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U employee -d mydatabase"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_network

  postgres_replica:
    image: postgres:18
    container_name: postgres_replica_db
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/setup-replica.sh"]
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: employee
      POSTGRES_PASSWORD: secret123
      MASTER_HOST: postgres_master
      MASTER_PORT: 5432
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: secret123
      REPLICATION_SLOT: replica_slot
    volumes:
      - postgres_replica_data:/var/lib/postgresql
      - ./docker/postgres/setup-replica.sh:/setup-replica.sh
    ports:
      - "5433:5432"
    depends_on:
      postgres_master:
        condition: service_healthy
    networks:
      - backend_network

  postgres_test_master:
    image: postgres:18
    container_name: postgres_test_master_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: employee_test_db
      POSTGRES_USER: employee
      POSTGRES_PASSWORD: secret123
      POSTGRES_HOST_AUTH_METHOD: trust
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: secret123
      REPLICATION_SLOT: test_replica_slot
    volumes:
      - postgres_test_master_data:/var/lib/postgresql
      - ./docker/postgres/create-replication-user.sh:/docker-entrypoint-initdb.d/create-replication-user.sh
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U employee -d employee_test_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_network

  postgres_test_replica:
    image: postgres:18
    container_name: postgres_test_replica_db
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/setup-replica.sh"]
    environment:
      POSTGRES_DB: employee_test_db
      POSTGRES_USER: employee
      POSTGRES_PASSWORD: secret123
      MASTER_HOST: postgres_test_master
      MASTER_PORT: 5432
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: secret123
      REPLICATION_SLOT: test_replica_slot
    volumes:
      - postgres_test_replica_data:/var/lib/postgresql
      - ./docker/postgres/setup-replica.sh:/setup-replica.sh
    ports:
      - "5435:5432"
    depends_on:
      postgres_test_master:
        condition: service_healthy
    networks:
      - backend_network

volumes:
  postgres_master_data:
  postgres_replica_data:
  postgres_test_master_data:
  postgres_test_replica_data:

networks:
  backend_network:
    name: backend_network
